<script>
    // Device-aware directions link
    // iPhone → Apple Maps, everything else → Google Maps
    const dest = '55+Moorefield+Road+London+N17+6PT';
    const googleMaps = 'https://www.google.com/maps/dir/?api=1&destination=' + dest;
    const appleMaps  = 'https://maps.apple.com/?daddr=' + dest + '&dirflg=d';

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const mapsURL = isIOS ? appleMaps : googleMaps;

    document.getElementById('directionsBtn').href = mapsURL;

    // Also make the map block tappable
    document.getElementById('mapBlock').addEventListener('click', function() {
        window.open(mapsURL, '_blank');
    });
    document.getElementById('mapBlock').style.cursor = 'pointer';
</script>
